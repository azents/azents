syntax = "proto3";

package azents.runtime_control.v1;

import "google/protobuf/timestamp.proto";

// Runtime-internal Runners open this outbound stream to Runtime Control.
service RuntimeRunnerControl {
  rpc ConnectRunner(stream RunnerMessage) returns (stream RunnerControlMessage);
}

message RunnerMessage {
  string connection_id = 1;
  string request_id = 2;
  uint64 generation = 3;

  oneof payload {
    RunnerRegister register = 10;
    RunnerHeartbeat heartbeat = 11;
    RunnerStateReport state_report = 20;
    RunnerOperationEvent operation_event = 21;
    RunnerOperationStart operation_start = 22;
    RunnerError error = 40;
  }
}

message RunnerControlMessage {
  string request_id = 1;

  oneof payload {
    RunnerRegisterAccepted register_accepted = 10;
    RunnerHeartbeatAck heartbeat_ack = 11;
    RunnerOperationRequest operation_request = 20;
    RunnerOperationStartAck operation_start_ack = 21;
    RunnerOperationCancel operation_cancel = 22;
    RunnerError error = 40;
  }
}

message RunnerRegister {
  string runtime_id = 1;
  string runner_id = 2;
  string protocol_version = 3;
  repeated string capabilities = 4;
  string health = 5;
  map<string, string> metadata = 6;
  string auth_credential_id = 7;
  string workspace_path = 8;
}

message RunnerRegisterAccepted {
  string runtime_id = 1;
  string runner_id = 2;
  string connection_id = 3;
  uint64 generation = 4;
  uint32 heartbeat_interval_seconds = 5;
}

message RunnerHeartbeat {
  uint64 monotonic_sequence = 1;
}

message RunnerHeartbeatAck {
  uint64 monotonic_sequence = 1;
}

message RunnerOperationStart {
  string runtime_id = 1;
  string operation_id = 2;
}

message RunnerOperationStartAck {
  bool allowed = 1;
}

message RunnerOperationCancel {
  string runtime_id = 1;
  string operation_id = 2;
}

message RunnerStateReport {
  string runtime_id = 1;
  string runner_id = 2;
  uint64 runner_generation = 3;
  string runner_state = 4;
  repeated string capabilities = 5;
  repeated string active_operation_ids = 6;
  string health = 7;
  map<string, string> diagnostic = 8;
  string workspace_path = 9;
  google.protobuf.Timestamp reported_at = 10;
}

message RunnerOperationRequest {
  string runtime_id = 1;
  uint64 runner_generation = 2;
  string operation_type = 3;
  optional string owner_session_id = 4;
  string reply_stream_id = 5;
  string body_stream_id = 6;
  reserved 7;
  google.protobuf.Timestamp deadline_at = 8;
  repeated RunnerBodyChunk body_chunks = 9;

  oneof payload {
    BashOperationPayload bash = 20;
    FileReadOperationPayload file_read = 21;
    FileWriteOperationPayload file_write = 22;
    FileListOperationPayload file_list = 23;
    FileGrepOperationPayload file_grep = 24;
    FileStatOperationPayload file_stat = 25;
    ProcessStartOperationPayload process_start = 26;
    ProcessWriteOperationPayload process_write = 27;
    FileDeleteOperationPayload file_delete = 28;
    FileMkdirOperationPayload file_mkdir = 29;
    FileMoveOperationPayload file_move = 30;
    ProcessTerminateSessionOperationPayload process_terminate_session = 31;
    FileBulkDeleteOperationPayload file_bulk_delete = 32;
    FileBulkMoveOperationPayload file_bulk_move = 33;
    GitListRefsOperationPayload git_list_refs = 34;
    GitCreateWorktreeOperationPayload git_create_worktree = 35;
    GitRemoveWorktreeOperationPayload git_remove_worktree = 36;
    GitDeleteBranchOperationPayload git_delete_branch = 37;
    FileGlobOperationPayload file_glob = 38;
    FileApplyPatchOperationPayload file_apply_patch = 39;
  }
}

message BashOperationPayload {
  string command = 1;
  uint32 timeout_seconds = 2;
  map<string, string> env = 3;
}

message FileReadOperationPayload {
  string path = 1;
  uint64 offset = 2;
  optional uint64 max_bytes = 3;
}

message FileWriteOperationPayload {
  string path = 1;
  uint64 total_bytes = 2;
}

message FileListOperationPayload {
  string path = 1;
  bool recursive = 2;
  repeated string exclude_patterns = 3;
}

message FileGlobOperationPayload {
  string pattern = 1;
  repeated string exclude_patterns = 2;
}

message FileGrepOperationPayload {
  string path = 1;
  string pattern = 2;
  optional bool recursive = 3;
  repeated string exclude_patterns = 4;
  uint32 max_matching_files = 5;
  uint32 max_lines_per_file = 6;
}

message FileStatOperationPayload {
  string path = 1;
}

message ProcessStartOperationPayload {
  reserved 6;
  reserved "owner_session_id";

  string command = 1;
  optional string workdir = 2;
  uint32 yield_time_ms = 3;
  uint32 max_output_bytes = 4;
  map<string, string> env = 5;
}

message ProcessWriteOperationPayload {
  reserved 5;
  reserved "owner_session_id";

  string process_id = 1;
  string stdin = 2;
  uint32 yield_time_ms = 3;
  uint32 max_output_bytes = 4;
}

message FileDeleteOperationPayload {
  string path = 1;
  bool recursive = 2;
}

message FileMkdirOperationPayload {
  string path = 1;
  bool parents = 2;
}

message FileMoveOperationPayload {
  string source_path = 1;
  string destination_path = 2;
  bool overwrite = 3;
}

message ProcessTerminateSessionOperationPayload {
  string owner_session_id = 1;
}

message FileBulkDeleteOperationPayload {
  repeated string paths = 1;
  bool recursive = 2;
}

message FileBulkMoveOperationPayload {
  repeated string source_paths = 1;
  string destination_directory = 2;
  bool overwrite = 3;
}

message GitListRefsOperationPayload {
  string source_project_path = 1;
}

message GitCreateWorktreeOperationPayload {
  string source_project_path = 1;
  string worktree_path = 2;
  string branch_name = 3;
  string starting_ref = 4;
}

message GitRemoveWorktreeOperationPayload {
  string source_project_path = 1;
  string worktree_path = 2;
  bool force = 3;
}

message GitDeleteBranchOperationPayload {
  string source_project_path = 1;
  string branch_name = 2;
}

message FileApplyPatchOperationPayload {
  string base_path = 1;
  uint64 total_bytes = 2;
  uint32 schema_version = 3;
}

message RunnerBodyChunk {
  uint64 chunk_id = 1;
  bytes data = 2;
  bool final = 3;
}

message RunnerOperationEvent {
  string runtime_id = 1;
  string operation_id = 2;
  uint64 generation = 3;
  string event_type = 4;
  google.protobuf.Timestamp created_at = 6;
  bool final = 7;

  oneof payload {
    RunnerOperationAcceptedPayload accepted = 20;
    RunnerOperationTextPayload stdout = 21;
    RunnerOperationTextPayload stderr = 22;
    RunnerOperationFileChunkPayload file_chunk = 23;
    RunnerOperationFinalSuccessPayload final_success = 24;
    RunnerOperationFinalErrorPayload final_error = 25;
    RunnerProcessOutputPayload process_output = 26;
  }
}

message RunnerOperationAcceptedPayload {
  string operation_type = 1;
}

message RunnerOperationTextPayload {
  string text = 1;
}

message RunnerOperationFileChunkPayload {
  string data_base64 = 1;
}

message RunnerProcessOutputPayload {
  string process_id = 1;
  string stream = 2;
  uint64 chunk_id = 3;
  string text = 4;
  bool truncated = 5;
  uint64 omitted_bytes = 6;
}

message RunnerOperationFinalSuccessPayload {
  oneof result {
    BashFinalSuccess bash = 1;
    FileReadFinalSuccess file_read = 2;
    FileWriteFinalSuccess file_write = 3;
    FileListFinalSuccess file_list = 4;
    FileGrepFinalSuccess file_grep = 5;
    FileStatFinalSuccess file_stat = 6;
    ProcessOperationFinalSuccess process = 7;
    FileDeleteFinalSuccess file_delete = 8;
    FileMkdirFinalSuccess file_mkdir = 9;
    FileMoveFinalSuccess file_move = 10;
    FileBulkDeleteFinalSuccess file_bulk_delete = 11;
    FileBulkMoveFinalSuccess file_bulk_move = 12;
    GitListRefsFinalSuccess git_list_refs = 13;
    GitCreateWorktreeFinalSuccess git_create_worktree = 14;
    GitRemoveWorktreeFinalSuccess git_remove_worktree = 15;
    GitDeleteBranchFinalSuccess git_delete_branch = 16;
    FileGlobFinalSuccess file_glob = 17;
    FileApplyPatchFinalSuccess file_apply_patch = 18;
  }
}

message RunnerOperationFinalErrorPayload {
  string error_code = 1;
  string error_message = 2;

  oneof detail {
    FileApplyPatchFailure file_apply_patch = 3;
  }
}

message BashFinalSuccess {
  int32 exit_code = 1;
}

message FileReadFinalSuccess {
  uint64 bytes_read = 1;
}

message FileWriteFinalSuccess {
  uint64 bytes_written = 1;
}

message RuntimeFilePatchOperation {
  string path = 1;
  string action = 2;
}

message RuntimeFilePatchChange {
  string path = 1;
  string action = 2;
  uint32 added_lines = 3;
  uint32 removed_lines = 4;
  optional string content_sha256 = 5;
}

message FileApplyPatchFinalSuccess {
  repeated RuntimeFilePatchChange changes = 1;
}

message FileApplyPatchFailure {
  string phase = 1;
  string reason = 2;
  repeated RuntimeFilePatchChange applied = 3;
  optional RuntimeFilePatchOperation failed = 4;
  repeated RuntimeFilePatchOperation not_attempted = 5;
  bool exact = 6;
}

message FileListFinalSuccess {
  repeated RuntimeFileListEntry entries = 1;
}

message FileGlobFinalSuccess {
  repeated RuntimeFileListEntry entries = 1;
}

message RuntimeFileListEntry {
  string path = 1;
  string type = 2;
  optional uint64 size_bytes = 3;
  optional string modified_at = 4;
}

message FileStatFinalSuccess {
  string path = 1;
  string kind = 2;
  optional uint64 size_bytes = 3;
  bool symlink = 4;
  optional string real_path = 5;
  optional string resolved_kind = 6;
  optional string modified_at = 7;
}

message FileDeleteFinalSuccess {
  string path = 1;
}

message FileMkdirFinalSuccess {
  string path = 1;
}

message FileMoveFinalSuccess {
  string source_path = 1;
  string destination_path = 2;
}

message FileBulkDeleteFinalSuccess {
  repeated string paths = 1;
}

message RuntimeFileMoveEntry {
  string source_path = 1;
  string destination_path = 2;
}

message FileBulkMoveFinalSuccess {
  repeated RuntimeFileMoveEntry entries = 1;
}

message RuntimeGitRefEntry {
  string name = 1;
  string ref = 2;
  string type = 3;
  string target = 4;
  bool default = 5;
}

message GitListRefsFinalSuccess {
  repeated RuntimeGitRefEntry refs = 1;
  string default_branch = 2;
  string head_commit = 3;
}

message GitCreateWorktreeFinalSuccess {
  string base_commit = 1;
  string worktree_path = 2;
  string branch_name = 3;
}

message GitRemoveWorktreeFinalSuccess {
  string worktree_path = 1;
}

message GitDeleteBranchFinalSuccess {
  string branch_name = 1;
}

message FileGrepFinalSuccess {
  repeated RuntimeGrepFileMatch files = 1;
  uint32 searched_file_count = 2;
  uint32 matched_file_count = 3;
  bool truncated = 4;
}

message ProcessOperationFinalSuccess {
  string process_id = 1;
  string status = 2;
  optional int32 exit_code = 3;
  string stdout = 4;
  string stderr = 5;
  bool stdout_truncated = 6;
  bool stderr_truncated = 7;
  uint64 stdout_omitted_bytes = 8;
  uint64 stderr_omitted_bytes = 9;
  string missing_reason = 10;
}

message RuntimeGrepFileMatch {
  string path = 1;
  repeated RuntimeGrepLineMatch lines = 2;
  bool truncated = 3;
}

message RuntimeGrepLineMatch {
  uint32 line_number = 1;
  string text = 2;
}

message RunnerError {
  string code = 1;
  string message = 2;
}
