name: azents-testenv

services:
  # testenvtranslated translated translated statetranslated translated — volume none.
  # previous runtranslated translated translated translated translated translated translated translated translated.
  # datatranslated Stage 1c translated translated translated translated translated translated translated.

  db:
    image: public.ecr.aws/docker/library/postgres:18-alpine
    restart: unless-stopped
    ports:
      - "${AZENTS_TESTENV_DB_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: azents
      POSTGRES_PASSWORD: azents
      POSTGRES_DB: azents

  valkey:
    image: public.ecr.aws/valkey/valkey:9-alpine
    restart: unless-stopped
    ports:
      - "${AZENTS_TESTENV_VALKEY_PORT:-6379}:6379"

  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.90
    restart: unless-stopped
    ports:
      - "${AZENTS_TESTENV_RUSTFS_PORT:-9000}:9000"
      - "${AZENTS_TESTENV_RUSTFS_CONSOLE_PORT:-9001}:9001"
    environment:
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_CONSOLE_ADDRESS: ":9001"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: "dummyaccess"
      RUSTFS_SECRET_KEY: "dummysecret"
      RUSTFS_VOLUMES: "/data"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  rustfs-init:
    image: minio/mc:latest
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set rustfs http://rustfs:9000 dummyaccess dummysecret;
      mc mb --ignore-existing rustfs/azents-dev;
      echo 'Bucket created successfully';
      "
