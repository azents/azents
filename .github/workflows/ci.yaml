name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}-${{ github.sha }}
  cancel-in-progress: true

env:
  UV_FROZEN: "1"

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ github.event_name != 'pull_request' || steps.filter.outputs.python == 'true' }}
      python_e2e: ${{ github.event_name != 'pull_request' || steps.filter.outputs['python-e2e'] == 'true' }}
      tool_search_runtime_provider_e2e: ${{ github.event_name != 'pull_request' || steps.filter.outputs['tool-search-runtime-provider-e2e'] == 'true' }}
      web_surface_e2e: ${{ github.event_name != 'pull_request' || steps.filter.outputs['web-surface-e2e'] == 'true' }}
      typescript: ${{ github.event_name != 'pull_request' || steps.filter.outputs.typescript == 'true' }}
      helm: ${{ github.event_name != 'pull_request' || steps.filter.outputs.helm == 'true' }}
      docker: ${{ github.event_name != 'pull_request' || steps.filter.outputs.docker == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
      - name: Compute changed scopes
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            python:
              - '.github/workflows/**'
              - '.pre-commit-config.yaml'
              - 'proto/**'
              - 'python/apps/azents/**'
              - 'python/apps/azents-runtime-provider-docker/**'
              - 'python/apps/azents-runtime-provider-kubernetes/**'
              - 'python/apps/azents-runtime-runner/**'
              - 'python/libs/az-common/**'
              - 'python/libs/azents-runtime-control/**'
            python-e2e:
              - '.github/workflows/**'
              - 'azents.Dockerfile'
              - 'docker-compose.azents.yaml'
              - 'proto/**'
              - 'python/apps/azents/**'
              - 'python/apps/azents-runtime-provider-docker/**'
              - 'python/apps/azents-runtime-provider-kubernetes/**'
              - 'python/apps/azents-runtime-runner/**'
              - 'python/libs/az-common/**'
              - 'python/libs/azents-admin-client/**'
              - 'python/libs/azents-public-client/**'
              - 'python/libs/azents-runtime-control/**'
              - 'testenv/azents/**'
            tool-search-runtime-provider-e2e:
              - '.github/workflows/ci.yaml'
              - 'testenv/azents/e2e/src/support/aimock_fixtures/agents_md_loader.json'
              - 'testenv/azents/e2e/src/support/image_generation_openai_proxy.py'
              - 'testenv/azents/e2e/src/support/slack_provider_fake.py'
              - 'testenv/azents/e2e/src/tests/conftest.py'
              - 'testenv/azents/e2e/src/tests/azents/public/test_automatic_session_projects.py'
              - 'testenv/azents/e2e/src/tests/azents/public/test_external_channels.py'
              - 'testenv/azents/e2e/src/tests/azents/public/test_runtime_hooks.py'
            web-surface-e2e:
              - '.dockerignore'
              - '.github/workflows/**'
              - 'azents.Dockerfile'
              - 'azents-admin-web.Dockerfile'
              - 'azents-web.Dockerfile'
              - 'proto/**'
              - 'python/apps/azents/**'
              - 'python/libs/az-common/**'
              - 'python/libs/azents-admin-client/**'
              - 'python/libs/azents-public-client/**'
              - 'python/libs/azents-runtime-control/**'
              - 'testenv/azents/**'
              - 'typescript/**'
            typescript:
              - '.github/workflows/**'
              - 'azents-admin-web.Dockerfile'
              - 'azents-web.Dockerfile'
              - 'python/apps/azents/specs/**'
              - 'typescript/**'
            helm:
              - '.github/workflows/**'
              - 'infra/charts/azents/**'
            docker:
              - '.dockerignore'
              - '.github/workflows/**'
              - '*.Dockerfile'
              - 'proto/**'
              - 'python/apps/azents/**'
              - 'python/apps/azents-runtime-provider-docker/**'
              - 'python/apps/azents-runtime-provider-kubernetes/**'
              - 'python/apps/azents-runtime-runner/**'
              - 'python/libs/az-common/**'
              - 'python/libs/azents-runtime-control/**'
              - 'typescript/**'

  ci-pre-commit:
    name: ci-pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: Cache pre-commit
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Install pre-commit
        run: python -m pip install --upgrade pre-commit
      - name: Run pre-commit structural hooks
        env:
          SKIP: ruff-check,ruff-format,pyright-az-common,dump-openapi-spec-azents,pyright-azents,pyright-testenv-azents-e2e,ts-format,ts-lint,ts-typecheck
        run: pre-commit run --all-files --show-diff-on-failure --color=always

  ci_python_run:
    name: ci-python-run
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - python/libs/az-common
          - python/libs/azents-runtime-control
          - python/apps/azents
          - python/apps/azents-runtime-runner
          - python/apps/azents-runtime-provider-kubernetes
          - python/apps/azents-runtime-provider-docker
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          cd "${{ matrix.project }}"
          uv sync
      - name: Ruff check
        run: |
          cd "${{ matrix.project }}"
          uv run ruff check .
      - name: Ruff format check
        run: |
          cd "${{ matrix.project }}"
          uv run ruff format --check .
      - name: Pyright
        run: |
          cd "${{ matrix.project }}"
          uv run pyright .
      - name: Pytest
        run: |
          cd "${{ matrix.project }}"
          uv run pytest -vv
      - name: Verify OpenAPI spec drift
        if: matrix.project == 'python/apps/azents'
        run: |
          cd python/apps/azents
          uv run python src/cli/dump_openapi.py
          git diff --exit-code -- specs

  ci-python:
    name: ci-python
    needs:
      - changes
      - ci_python_run
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate Python result
        run: |
          changes_result='${{ needs.changes.result }}'
          changed='${{ needs.changes.outputs.python }}'
          result='${{ needs.ci_python_run.result }}'
          if [ "$changes_result" != 'success' ]; then
            echo "changes job failed or was skipped: $changes_result"
            exit 1
          fi
          if [ "$changed" != 'true' ]; then
            echo 'Python scope unchanged; passing.'
            exit 0
          fi
          if [ "$result" = 'success' ]; then
            exit 0
          fi
          echo "Python scope changed but ci-python-run result was: $result"
          exit 1

  ci_python_e2e_run:
    name: ci-deterministic-e2e-run
    needs: changes
    if: needs.changes.outputs.python_e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Install dependencies
        run: |
          cd testenv/azents/e2e
          uv sync
      - name: Ruff check
        run: |
          cd testenv/azents/e2e
          uv run ruff check .
      - name: Ruff format check
        run: |
          cd testenv/azents/e2e
          uv run ruff format --check .
      - name: Pyright
        run: |
          cd testenv/azents/e2e
          uv run pyright .
      - name: Run deterministic E2E
        run: |
          cd testenv/azents/e2e
          uv run pytest -vv \
            -m "not live_external and not runtime_provider and not web_surface" \
            ./src

  ci_tool_search_runtime_provider_e2e_run:
    name: ci-tool-search-runtime-provider-e2e-run
    needs: changes
    if: needs.changes.outputs.tool_search_runtime_provider_e2e == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Install dependencies
        run: |
          cd testenv/azents/e2e
          uv sync
      - name: Run focused runtime-provider E2E
        run: |
          cd testenv/azents/e2e
          uv run pytest -vv -s \
            src/tests/azents/public/test_runtime_hooks.py::TestRuntimeHooks::test_runtime_hooks_execute_through_public_chat_path \
            src/tests/azents/public/test_runtime_hooks.py::TestRuntimeHooks::test_tool_search_persists_deferred_probe_across_runs \
            src/tests/azents/public/test_external_channels.py::test_provider_native_channel_work_progress_journey \
            src/tests/azents/public/test_automatic_session_projects.py

  ci_web_surface_e2e_run:
    name: ci-web-surface-e2e-run
    needs: changes
    if: needs.changes.outputs.web_surface_e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Install dependencies
        run: |
          cd testenv/azents/e2e
          uv sync
      - name: Run Web Surface E2E
        run: |
          cd testenv/azents/e2e
          uv run pytest -vv \
            -m "web_surface and not live_external and not runtime_provider" \
            ./src

  ci-python-e2e:
    name: ci-python-e2e
    needs:
      - changes
      - ci_python_e2e_run
      - ci_tool_search_runtime_provider_e2e_run
      - ci_web_surface_e2e_run
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate E2E results
        run: |
          changes_result='${{ needs.changes.result }}'
          deterministic_changed='${{ needs.changes.outputs.python_e2e }}'
          deterministic_result='${{ needs.ci_python_e2e_run.result }}'
          tool_search_runtime_provider_changed='${{ needs.changes.outputs.tool_search_runtime_provider_e2e }}'
          tool_search_runtime_provider_result='${{ needs.ci_tool_search_runtime_provider_e2e_run.result }}'
          web_surface_changed='${{ needs.changes.outputs.web_surface_e2e }}'
          web_surface_result='${{ needs.ci_web_surface_e2e_run.result }}'
          if [ "$changes_result" != 'success' ]; then
            echo "changes job failed or was skipped: $changes_result"
            exit 1
          fi
          if [ "$deterministic_changed" = 'true' ] \
            && [ "$deterministic_result" != 'success' ]; then
            echo "Deterministic E2E result was: $deterministic_result"
            exit 1
          fi
          if [ "$tool_search_runtime_provider_changed" = 'true' ] \
            && [ "$tool_search_runtime_provider_result" != 'success' ]; then
            echo "Tool Search runtime-provider E2E result was: $tool_search_runtime_provider_result"
            exit 1
          fi
          if [ "$web_surface_changed" = 'true' ] \
            && [ "$web_surface_result" != 'success' ]; then
            echo "Web Surface E2E result was: $web_surface_result"
            exit 1
          fi
          echo 'All changed E2E scopes passed.'

  ci_typescript_run:
    name: ci-typescript-run
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Install pnpm
        uses: pnpm/action-setup@f3d73ada1fa6e5c0c19973ff70a3f5cabf225cc5 # v6.0.0
        with:
          package_json_file: typescript/package.json
      - name: Install dependencies
        run: cd typescript && pnpm install --frozen-lockfile
      - name: Generate API clients
        run: cd typescript && pnpm run generate
      - name: Format check
        run: cd typescript && pnpm run format:check
      - name: Lint
        run: cd typescript && pnpm run lint
      - name: Typecheck
        run: cd typescript && pnpm run typecheck

  ci-typescript:
    name: ci-typescript
    needs:
      - changes
      - ci_typescript_run
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate TypeScript result
        run: |
          changes_result='${{ needs.changes.result }}'
          changed='${{ needs.changes.outputs.typescript }}'
          result='${{ needs.ci_typescript_run.result }}'
          if [ "$changes_result" != 'success' ]; then
            echo "changes job failed or was skipped: $changes_result"
            exit 1
          fi
          if [ "$changed" != 'true' ]; then
            echo 'TypeScript scope unchanged; passing.'
            exit 0
          fi
          if [ "$result" = 'success' ]; then
            exit 0
          fi
          echo "TypeScript scope changed but ci-typescript-run result was: $result"
          exit 1

  ci_helm_run:
    name: ci-helm-run
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Setup Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: Install pytest
        run: python -m pip install --upgrade pytest
      - name: Helm lint
        run: |
          helm lint infra/charts/azents \
            --set server.image.repository=repo/server \
            --set server.image.tag=sha \
            --set web.image.repository=repo/web \
            --set web.image.tag=sha \
            --set adminWeb.image.repository=repo/admin-web \
            --set adminWeb.image.tag=sha \
            --set secrets.existingSecrets.redis=azents-redis
      - name: Helm render tests
        run: python -m pytest -vv infra/charts/azents/tests

  ci-helm:
    name: ci-helm
    needs:
      - changes
      - ci_helm_run
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate Helm result
        run: |
          changes_result='${{ needs.changes.result }}'
          changed='${{ needs.changes.outputs.helm }}'
          result='${{ needs.ci_helm_run.result }}'
          if [ "$changes_result" != 'success' ]; then
            echo "changes job failed or was skipped: $changes_result"
            exit 1
          fi
          if [ "$changed" != 'true' ]; then
            echo 'Helm scope unchanged; passing.'
            exit 0
          fi
          if [ "$result" = 'success' ]; then
            exit 0
          fi
          echo "Helm scope changed but ci-helm-run result was: $result"
          exit 1

  ci_docker_build_run:
    name: ci-docker-build-run
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: azents-server
            dockerfile: azents.Dockerfile
            image: azents-server:ci
            extra_context: ""
          - name: azents-web
            dockerfile: azents-web.Dockerfile
            image: azents-web:ci
            extra_context: "--build-context next-cache=/tmp/next-cache"
          - name: azents-admin-web
            dockerfile: azents-admin-web.Dockerfile
            image: azents-admin-web:ci
            extra_context: "--build-context next-cache=/tmp/next-cache"
          - name: azents-runtime-runner
            dockerfile: python/apps/azents-runtime-runner/Dockerfile
            image: azents-runtime-runner:ci
            extra_context: ""
          - name: azents-runtime-provider-kubernetes
            dockerfile: python/apps/azents-runtime-provider-kubernetes/Dockerfile
            image: azents-runtime-provider-kubernetes:ci
            extra_context: ""
          - name: azents-runtime-provider-docker
            dockerfile: python/apps/azents-runtime-provider-docker/Dockerfile
            image: azents-runtime-provider-docker:ci
            extra_context: ""
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Prepare empty Next.js cache context
        run: mkdir -p /tmp/next-cache/next-cache
      - name: Build ${{ matrix.name }}
        run: |
          docker buildx build \
            --load \
            ${{ matrix.extra_context }} \
            -f "${{ matrix.dockerfile }}" \
            -t "${{ matrix.image }}" \
            .

  ci-docker-build:
    name: ci-docker-build
    needs:
      - changes
      - ci_docker_build_run
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate Docker build result
        run: |
          changes_result='${{ needs.changes.result }}'
          changed='${{ needs.changes.outputs.docker }}'
          result='${{ needs.ci_docker_build_run.result }}'
          if [ "$changes_result" != 'success' ]; then
            echo "changes job failed or was skipped: $changes_result"
            exit 1
          fi
          if [ "$changed" != 'true' ]; then
            echo 'Docker scope unchanged; passing.'
            exit 0
          fi
          if [ "$result" = 'success' ]; then
            exit 0
          fi
          echo "Docker scope changed but ci-docker-build-run result was: $result"
          exit 1
